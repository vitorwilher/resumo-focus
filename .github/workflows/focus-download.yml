name: Focus - download e extração

# Roda toda segunda-feira às 9h15 BRT (12h15 UTC) e também sob disparo manual.
on:
  schedule:
    # cron em UTC: 15 min, 12 h, qualquer dia do mês/mês, dia-da-semana 1 (segunda).
    - cron: "15 12 * * 1"
  workflow_dispatch:

# Necessário para o job conseguir commitar os arquivos de volta ao repositório.
permissions:
  contents: write

jobs:
  baixar-e-extrair:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configura o Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Instala as dependências
        run: pip install -r requirements.txt

      - name: Baixa o PDF do Focus
        run: python src/baixar_focus.py

      - name: Extrai o texto do PDF
        run: python src/extrair_texto.py

      - name: Commita os arquivos baixados de volta ao repositório
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/focus_*.pdf data/focus_*.txt
          # Só commita se houver de fato algo novo para versionar.
          if git diff --staged --quiet; then
            echo "Nenhum arquivo novo do Focus para commitar."
          else
            git commit -m "Focus: download e extração automáticos"
            git push
          fi
